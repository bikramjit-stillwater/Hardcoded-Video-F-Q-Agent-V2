<!DOCTYPE html>
<html>
<head>
  <title>Stillwater Yoga</title>

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #e6f4f1, #f7fbfa);
      text-align: center;
    }

    #logo {
      position: fixed;
      top: 15px;
      left: 20px;
      width: 70px;
      border-radius: 12px;
    }

    .container {
      max-width: 900px;
      margin: 60px auto;
      padding: 20px;
    }

    h1 {
      color: #2c5f5d;
    }

    video {
      width: 100%;
      border-radius: 15px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    }

    /* Ask AI Button */
    #askBtn {
      position: fixed;
      bottom: 20px;
      right: 20px;
      padding: 12px 20px;
      border-radius: 30px;
      border: none;
      background: #2c7a7b;
      color: white;
      cursor: pointer;
      font-size: 14px;
    }

    /* Agent */
    #agentBox {
      display: none;
      position: fixed;
      bottom: 80px;
      right: 20px;
      width: 300px;
      z-index: 999;
    }
  </style>
</head>

<body>

  <!-- LOGO -->
  <img id="logo"
       src="https://media.licdn.com/dms/image/v2/D560BAQEuMEuoQOLNOg/company-logo_200_200/B56Z1iBkplJsAI-/0/1775466073533/stilwater_you_logo?e=1779321600&v=beta&t=yEpGMXIbEhVeaEw3KWC42nPk7bi5n-3fPeEh0cn4IsE"
       alt="Stillwater Logo">

  <div class="container">

    <h1>🧘 AI Powered Yoga Guide</h1>

    <!-- LOCAL VIDEO -->
    <video controls autoplay>
      <source src="yoga.mp4" type="video/mp4">
      Your browser does not support video.
    </video>

  </div>

  <!-- ASK AI BUTTON -->
  <button id="askBtn" onclick="openAgent()">💬 Ask AI</button>

  <!-- AGENT (NEW ID) -->
  <div id="agentBox">
    <lemon-slice-widget agent-id="agent_77081533e48ba693"></lemon-slice-widget>
  </div>

  <script type="module" src="https://unpkg.com/@lemonsliceai/lemon-slice-widget"></script>

  <script>
    function openAgent() {
      document.getElementById("agentBox").style.display = "block";
    }
  </script>

</body>
</html>
